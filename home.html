<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee — Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fff;
            color: #222;
        }

        /* ============================
   TOP NAVBAR
============================ */
.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 50px;
    font-size: 13px;
    background: #111;
    color: #fff;
}

.top-nav-left {
    opacity: 0.85;
}

.top-nav-right a {
    color: #fff;
    text-decoration: none;
    margin-left: 18px;
    font-size: 13px;
}
.top-nav-right a:hover {
    text-decoration: underline;
}


        /* ================= HEADER ================= */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 50px;
            border-bottom: 1px solid #eee;
        }

        .nav-right a {
            margin-left: 28px;
            text-decoration: none;
            color: #333;
            font-size: 15px;
        }

        /* ================= BANNER ================= */
        .image-bar {
            width: 100%;
            margin: 0 auto 40px;
        }

        .image-bar img {
            width: 100%;
            height: 420px;
            object-fit: cover;  
            display: block;
        }

        /* ================= SORT ================= */
        .sort-bar {
            padding: 0 50px 20px;
            display: flex;
            justify-content: flex-end;
        }

        select {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        /* ================= SERVICE CARDS ================= */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            padding: 0 50px 60px;
        }

        .service-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.09);
            text-align: center;
            padding-bottom: 22px;
        }

        .service-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .service-card h4 {
            margin-top: 18px;
            font-size: 17px;
            font-weight: 700;
        }

        /* ================= FOOTER ================= */
        .footer {
            background: #f8f8f8;
            border-top: 1px solid #eee;
            padding: 50px;
            color: #444;
        }

        .footer h3 {
            margin: 0 0 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .footer p {
            margin: 4px 0;
            font-size: 14px;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 900px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .services-grid {
                grid-template-columns: 1fr;
            }
        }

        .service-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.09);
    text-align: center;
    padding-bottom: 22px;
    cursor: pointer;
    transition: transform .25s ease, box-shadow .25s ease;
}

.service-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.16);
}

.service-card a {
    text-decoration: none;
    color: inherit;
    display: block;
}


    </style>
</head>

<body>

<!-- ========== TOP NAVBAR ========== -->
<div class="top-nav">
    <div class="top-nav-left">
        
    </div>
    <div class="top-nav-right">
        <a href="home.html">Home</a>
        <a href="index.html">Our Beans</a>
        <a href="roastery.html">Roastery</a>
        <a href="contact.html">Contact Us</a>
    </div>
</div>


<!-- ========== NAVBAR ========== -->
<div class="nav">
    <a href="home.html">
        <img src="assets/products/logo.png" alt="Coffee Logo" style="height:32px;">
    </a>
    <div class="nav-right">
        <a href="Daftar.html">Daftar</a>
        <a href="Login.html">Login</a>
    </div>
</div>



    <!-- ================= BANNER ================= -->
    <div class="image-bar">
        <img src="assets/products/banner home.jpg" alt="Image Banner">
    </div>

    <!-- ================= SORT ================= -->
    <div class="sort-bar">
        <select id="sortSelect">
            <option value="newest">Sort by: Newest</option>
            <option value="price-high">Highest Price</option>
            <option value="price-low">Lowest Price</option>
        </select>
    </div>

    <!-- ================= SERVICES ================= -->
    <div class="services-grid" id="servicesGrid">

        <!-- Tambahan data-date (YYYY-MM-DD) dan data-price (angka) -->

        <div class="service-card" data-date="2025-01-14" data-price="150">
    <a href="index.html">
        <img src="assets/products/colombia.jpg" alt="">
        <h4>Arabica Coffee Beans</h4>
    </a>
</div>


        <div class="service-card" data-date="2025-01-14" data-price="150">
    <a href="index.html">
        <img src="assets/products/banner roastery.jpg" alt="">
        <h4>Coffee Partners</h4>
    </a>
</div>

        <div class="service-card" data-date="2025-01-14" data-price="150">
    <a href="index.html">
        <img src="assets/products/kenya.jpg" alt="">
        <h4>Latest Product</h4>
    </a>
</div>


        <div class="service-card" data-date="2025-01-14" data-price="150">
    <a href="index.html">
        <img src="assets/products/coffee recipe.jpg" alt="">
        <h4>Coffee Brew Recipe</h4>
    </a>
</div>


    </div>

    <!-- ================= FOOTER ================= -->
    <div class="footer">
        <h3>Contact Us</h3>
        <p>Email: hello@coffee.com</p>
        <p>Phone: +62 812 3456 7890</p>
        <p>Location: Jl. Kopi No. 12, Jakarta</p>
    </div>

    <!-- ================= SORT SCRIPT ================= -->
    <script>
        const grid = document.getElementById('servicesGrid');
        const sortSelect = document.getElementById('sortSelect');

        sortSelect.addEventListener('change', function () {
            let cards = Array.from(grid.children);

            if (this.value === 'newest') {
                cards.sort((a, b) =>
                    new Date(b.dataset.date) - new Date(a.dataset.date)
                );
            }

            if (this.value === 'price-high') {
                cards.sort((a, b) =>
                    Number(b.dataset.price) - Number(a.dataset.price)
                );
            }

            if (this.value === 'price-low') {
                cards.sort((a, b) =>
                    Number(a.dataset.price) - Number(b.dataset.price)
                );
            }

            cards.forEach(card => grid.appendChild(card));
        });
    </script>

</body>
</html>
